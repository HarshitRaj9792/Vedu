log_level: debug



ws_url: ws://livekit:7880
insecure: true
template_port: 7980

# Redis configuration
redis:
  address: redis:6379
  username: ""
  password: ""

# Health check port
health_port: 8080

# ✅ FIXED: Remove hardcoded file_outputs - this causes issues!
# Instead, recordings are specified per-request from the backend




# ✅ RECOMMENDED: Recording quality settings
recording:
  # Layout: speaker, speaker_light, grid
  default_layout: speaker

  # Video codec: h264, vp8, vp9, av1
  video_codec: h264
  audio_codec: aac

  # Resolution & framerate
  frame_rate: 30
  key_frame_interval: 2

# ✅ OPTIONAL: Ingress configuration
ingress:
  rtmp_port: 1935
  whip_port: 8080

# ✅ OPTIONAL: Webhook for egress events
# webhook_api_key: ${EGRESS_WEBHOOK_KEY}
# webhook_api_secret: ${EGRESS_WEBHOOK_SECRET}