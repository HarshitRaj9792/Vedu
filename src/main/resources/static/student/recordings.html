<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vedu | Student Recordings</title>
  <style>
    /* Shared Liquid UI Base */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { background: linear-gradient(135deg, #dae9f6 0%, #a6c8e8 60%, #cbdff2 100%); min-height: 100vh; display: flex; color: #1a365d; }
    nav { width: 280px; background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(20px); border-right: 1px solid rgba(255, 255, 255, 0.4); display: flex; flex-direction: column; padding: 30px 20px; }
    .logo { font-size: 24px; font-weight: 800; margin-bottom: 50px; display: flex; align-items: center; gap: 10px; }
    .nav-btn { padding: 15px; margin-bottom: 10px; border-radius: 15px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 12px; text-decoration: none; color: #1a365d; font-weight: 600; }
    .nav-btn:hover, .nav-btn.active { background: rgba(255, 255, 255, 0.4); transform: translateX(5px); color: #3c52ff; }
    main { flex: 1; padding: 40px; overflow-y: auto; }
    .glass-card { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 30px; padding: 30px; margin-bottom: 30px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05); }
    .liquid-text { background: linear-gradient(135deg, #3c52ff, #7db1e0); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
    
    .rec-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
    .rec-item { background: rgba(255,255,255,0.4); border-radius: 15px; overflow: hidden; display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.6); }
    .rec-item video { width: 100%; height: 180px; object-fit: cover; background: #000; }
    .rec-info { padding: 15px; }
    .rec-title { font-weight: 700; margin-bottom: 5px; }
    .rec-date { font-size: 12px; color: #5d7fa0; margin-bottom: 15px; }
    .action-btn { background: #3c52ff; color: white; padding: 8px 15px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; text-decoration: none; display: inline-block; text-align: center; width: 100%; transition: 0.2s;}
    .action-btn:hover { background: #2a3ecc; }
    .empty-state { text-align: center; color: #5d7fa0; padding: 50px 0; }
  </style>
</head>
<body>
  <nav>
    <div class="logo">💠 <span>Vedu</span></div>
    <a href="/student/index.html" class="nav-btn">🏠 Student Home</a>
    <a href="/student/schedulepage.html" class="nav-btn">📅 Class Schedule</a>
    <a href="/student/recordings.html" class="nav-btn active">📼 All Recordings</a>
    <a href="#" class="nav-btn">📝 Assignments</a>
    <a href="#" class="nav-btn">⚙️ Settings</a>
  </nav>

  <main>
    <section class="glass-card">
      <h1 class="liquid-text">Classroom Recordings</h1>
      <p style="margin-top: 5px; color: #5d7fa0;">Catch up on classes you missed.</p>
      <div id="loading" style="margin-top: 20px;">Fetching from server...</div>
      <div class="rec-grid" id="rec-grid">
         <!-- Populated via JS -->
      </div>
    </section>
  </main>

  <script>
    async function loadRecordings() {
      const token = localStorage.getItem('vedu_token');
      if (!token) {
        window.location.href = "/login.html";
        return;
      }

      try {
        const res = await fetch('/api/recordings', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (res.ok) {
          const list = await res.json();
          document.getElementById('loading').style.display = 'none';
          
          if (!list || list.length === 0) {
            document.getElementById('rec-grid').innerHTML = '<div class="empty-state">No recordings available.</div>';
            return;
          }

          let html = '';
          list.forEach(rec => {
            const date = new Date(rec.createdAt).toLocaleString();
            html += `
              <div class="rec-item">
                <video controls src="${rec.fileUrl}" preload="metadata"></video>
                <div class="rec-info">
                  <div class="rec-title">${rec.roomName}</div>
                  <div class="rec-date">${date}</div>
                  <a href="${rec.fileUrl}" download target="_blank" class="action-btn">Watch / Download</a>
                </div>
              </div>
            `;
          });
          document.getElementById('rec-grid').innerHTML = html;
        } else {
            document.getElementById('loading').innerText = "Failed to fetch recordings from server.";
        }
      } catch (e) {
          console.error(e);
          document.getElementById('loading').innerText = "Server connection error.";
      }
    }

    window.onload = loadRecordings;
  </script>
</body>
</html>
