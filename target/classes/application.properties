# ── Server ───────────────────────────────────────────────────
server.address=0.0.0.0
server.port=8080

# ── Static files ─────────────────────────────────────────────
spring.web.resources.static-locations=classpath:/static/

# ── LiveKit ──────────────────────────────────────────────────
# LIVEKIT_URL  → internal docker address (set in docker-compose: http://livekit:7880)
# LIVEKIT_API_KEY / LIVEKIT_API_SECRET → set in .env
LIVEKIT_URL=${LIVEKIT_URL:http://livekit:7880}
LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
OPENVIDU_URL=${LIVEKIT_URL:http://livekit:7880}
# Java code reads OPENVIDU_SECRET; our .env exports LIVEKIT_API_SECRET
OPENVIDU_SECRET=${LIVEKIT_API_SECRET}

# ── MinIO ────────────────────────────────────────────────────
# MINIO_URL   → internal docker address (set in docker-compose: http://minio:9000)
# MINIO_PUBLIC_URL → public-facing URL for students (set in .env)
MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:minioadmin}
MINIO_SECRET_KEY=${MINIO_SECRET_KEY:minioadmin}
MINIO_BUCKET=${MINIO_BUCKET:recordings}
# RecordingService reads MINIO_ENDPOINT; docker-compose exports MINIO_URL
MINIO_ENDPOINT=${MINIO_URL:http://minio:9000}
MINIO_PUBLIC_URL=${MINIO_PUBLIC_URL:http://localhost:9000}

# ── Supabase ─────────────────────────────────────────────────
supabase.url=${SUPABASE_URL}
supabase.anon.key=${SUPABASE_ANON_KEY}
supabase.jwt.secret=${SUPABASE_JWT_SECRET}

# ── Database (Supabase PostgreSQL) ───────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5

# ── JPA ──────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Mail (DISABLED — set SMTP_ENABLED=true and fill SMTP_* vars to enable) ──
# Currently using no-op defaults so the app starts without a mail server.
spring.mail.host=${SMTP_HOST:localhost}
spring.mail.port=${SMTP_PORT:25}
spring.mail.username=${SMTP_USERNAME:noreply@vedu.local}
spring.mail.password=${SMTP_PASSWORD:disabled}
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
# IMPORTANT: prevents Spring from testing SMTP connection on startup
spring.mail.test-connection=false
