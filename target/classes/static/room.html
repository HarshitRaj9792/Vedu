<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Vedu | Live Classroom</title>

  <!-- LiveKit: handles all media (audio/video capture, publish, subscribe, signaling) -->
  <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>

  <!-- OpenTok Layout JS: handles ONLY the spatial positioning of video tiles -->
  <!-- Primary: jsDelivr (npm) — the correct CDN for this package -->
  <script src="https://cdn.jsdelivr.net/npm/opentok-layout-js@5.4.0/opentok-layout.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0b0f1a;
      --surface: #131928;
      --border: rgba(255, 255, 255, 0.08);
      --accent: #4f6ef7;
      --accent-hi: #7b93ff;
      --danger: #f74f6e;
      --text: #e2e8f0;
      --muted: #64748b;
      --radius: 14px;
      --ctrl-h: 84px;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* ── PAGE STRUCTURE ─────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      height: 100dvh;
    }

    /* ── VIDEO GRID (opentok-layout target) ─────── */
    /*
         * RULES required by opentok-layout-js:
         *   1. Must be position: relative (or absolute)
         *   2. Children must be position: absolute — the lib writes top/left/width/height
         */
    #video-grid {
      position: relative;
      /* Rule 1 */
      flex: 1;
      width: 100%;
      overflow: hidden;
      background: var(--bg);
      padding: 8px;
    }

    /* ── VIDEO TILE (each participant/screen) ────── */
    /*
         * RULES:
         *   position: absolute is MANDATORY — opentok-layout sets coordinates directly.
         *   The library adds the class "ot-layout" once a tile has been positioned,
         *   which we use to trigger the fade-in animation.
         */
    .video-tile {
      position: absolute;
      /* Rule 2 */
      background: var(--surface);
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      overflow: hidden;
      /* Smooth repositioning as participants join/leave */
      transition: top 0.35s ease, left 0.35s ease,
        width 0.35s ease, height 0.35s ease, opacity 0.3s ease;
      opacity: 0;
      /* hidden until ot-layout class is applied */
    }

    /* Fired by opentok-layout once tile is positioned */
    .video-tile.ot-layout {
      opacity: 1;
    }

    /* Pinned / screen-share tile gets a blue ring */
    .video-tile.OT_big {
      border-color: var(--accent);
      border-width: 2px;
      z-index: 10;
    }

    /* The actual <video> element inside every tile */
    .video-tile video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      /* fill the box the lib calculated */
      display: block;
      background: #000;
    }

    /* Only the local camera tile gets mirrored (selfie view) */
    .video-tile.is-local video {
      transform: scaleX(-1) !important;
    }

    /* Remote participant
         .video-tile:not(.is-local) video { transform: scaleX(-1) !important; } */

    /* Name badge */
    .tile-name {
      position: absolute;
      bottom: 9px;
      left: 10px;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(6px);
      padding: 3px 10px;
      border-radius: 7px;
      font-size: 11.5px;
      font-weight: 500;
      letter-spacing: 0.02em;
      pointer-events: none;
      z-index: 12;
    }

    /* Muted mic badge */
    .tile-muted {
      position: absolute;
      top: 9px;
      left: 10px;
      background: rgba(247, 79, 110, 0.85);
      border-radius: 6px;
      padding: 3px 7px;
      font-size: 11px;
      display: none;
      z-index: 12;
    }

    .tile-muted.show {
      display: block;
    }

    /* Pin button */
    .tile-pin {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: #fff;
      width: 30px;
      height: 30px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s, background 0.2s;
      z-index: 12;
    }

    .video-tile:hover .tile-pin {
      opacity: 1;
    }

    .video-tile.OT_big .tile-pin {
      opacity: 1;
      background: rgba(79, 110, 247, 0.5);
    }

    /* ── CONTROLS BAR ────────────────────────────── */
    #controls {
      height: var(--ctrl-h);
      background: rgba(19, 25, 40, 0.9);
      backdrop-filter: blur(18px);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .ctrl-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
    }

    .ctrl-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      transform: scale(1.06);
    }

    .ctrl-btn.off {
      background: var(--danger);
      border-color: var(--danger);
    }

    .ctrl-leave {
      width: auto;
      padding: 0 22px;
      border-radius: 12px;
      background: var(--danger);
      border-color: var(--danger);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .ctrl-leave:hover {
      background: #e03358;
    }

    /* ── MEDIA QUERIES (Mobile) ──────────────────── */
    @media (max-width: 600px) {
      :root {
        --ctrl-h: 64px;
      }

      #controls {
        gap: 6px;
        padding: 0 4px;
        overflow-x: auto;
      }

      .ctrl-btn {
        width: 40px;
        height: 40px;
        font-size: 15px;
        flex-shrink: 0;
      }

      .ctrl-leave {
        padding: 0 12px;
        font-size: 12px;
      }
    }

    /* ── EMPTY STATE ─────────────────────────────── */
    #empty-msg {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--muted);
      font-size: 14px;
      pointer-events: none;
    }

    #empty-msg span {
      font-size: 36px;
    }

    /* ── HAND RAISE BADGE (on tile) ──────────────── */
    .tile-hand {
      position: absolute;
      top: 9px;
      right: 46px;
      font-size: 20px;
      display: none;
      z-index: 13;
      animation: hand-wave 0.5s ease-in-out infinite alternate;
      filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.6));
    }

    .tile-hand.show {
      display: block;
    }

    @keyframes hand-wave {
      from {
        transform: rotate(-18deg);
      }

      to {
        transform: rotate(18deg);
      }
    }

    /* ── HAND TOAST (top-right notif) ───────────── */
    #hand-notify {
      position: fixed;
      top: 18px;
      right: 18px;
      background: rgba(245, 158, 11, 0.96);
      color: #000;
      border-radius: 12px;
      padding: 11px 18px;
      font-size: 13px;
      font-weight: 700;
      opacity: 0;
      transform: translateY(-8px);
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      z-index: 1000;
    }

    #hand-notify.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── RECORDING BUTTON & INDICATOR ─────────── */
    @keyframes rec-pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    .ctrl-btn.recording {
      background: var(--danger);
      border-color: var(--danger);
      animation: rec-pulse 1.2s ease-in-out infinite;
    }

    #rec-indicator {
      position: fixed;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(247, 79, 110, 0.92);
      color: #fff;
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.05em;
      display: none;
      z-index: 999;
      gap: 7px;
      align-items: center;
    }

    #rec-indicator.show {
      display: flex;
    }

    /* ── CHAT PANEL ──────────────────────────────── */
    #chat-panel {
      position: fixed;
      right: 0;
      top: 0;
      bottom: 0;
      width: 320px;
      background: #0e1525;
      border-left: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 200;
    }

    #chat-panel.open {
      transform: translateX(0);
    }

    #chat-header {
      padding: 16px 18px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      font-weight: 600;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #chat-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 20px;
      cursor: pointer;
      line-height: 1;
    }

    #chat-close:hover {
      color: var(--text);
    }

    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px 14px 6px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #chat-messages::-webkit-scrollbar {
      width: 4px;
    }

    #chat-messages::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }

    .chat-msg {
      max-width: 90%;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.45;
      word-break: break-word;
    }

    .chat-msg.mine {
      align-self: flex-end;
      background: rgba(79, 110, 247, 0.25);
      border: 1px solid rgba(79, 110, 247, 0.35);
    }

    .chat-msg.theirs {
      align-self: flex-start;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .chat-msg .msg-meta {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 3px;
      font-weight: 500;
    }

    #chat-input-row {
      padding: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      gap: 8px;
    }

    #chat-input {
      flex: 1;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      color: var(--text);
      padding: 9px 12px;
      font-size: 13px;
      outline: none;
      font-family: inherit;
    }

    #chat-input:focus {
      border-color: var(--accent);
    }

    #chat-send {
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: #fff;
      padding: 9px 14px;
      cursor: pointer;
      font-size: 15px;
      transition: background 0.2s;
    }

    #chat-send:hover {
      background: var(--accent-hi);
    }

    /* Unread badge on chat button */
    #chat-btn {
      position: relative;
    }

    #chat-unread {
      position: absolute;
      top: -4px;
      right: -4px;
      background: var(--danger);
      color: #fff;
      border-radius: 50%;
      width: 16px;
      height: 16px;
      font-size: 10px;
      font-weight: 700;
      display: none;
      align-items: center;
      justify-content: center;
    }

    #chat-unread.show {
      display: flex;
    }

    /* ── WHITEBOARD PANEL ────────────────────────── */
    #whiteboard-panel {
      display: none;
      flex-direction: column;
      z-index: 50;
      /* Above normal tiles */
    }

    #whiteboard-panel.open {
      display: flex !important;
    }

    #wb-header {
      padding: 14px 18px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      font-weight: 600;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    #wb-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 20px;
      cursor: pointer;
      line-height: 1;
    }

    #wb-close:hover {
      color: var(--text);
    }

    #wb-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .wb-btn {
      background: rgba(255, 255, 255, 0.07);
      border: 1.5px solid rgba(255, 255, 255, 0.12);
      color: var(--text);
      border-radius: 9px;
      padding: 6px 13px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      font-family: inherit;
    }

    .wb-btn:hover {
      background: rgba(255, 255, 255, 0.14);
    }

    .wb-btn.active {
      background: rgba(79, 110, 247, 0.3);
      border-color: var(--accent);
    }

    .wb-btn.danger {
      background: rgba(247, 79, 110, 0.18);
      border-color: var(--danger);
      color: var(--danger);
    }

    .wb-btn.danger:hover {
      background: rgba(247, 79, 110, 0.32);
    }

    #wb-color {
      width: 34px;
      height: 34px;
      border: none;
      border-radius: 8px;
      padding: 2px;
      background: none;
      cursor: pointer;
    }

    #wb-size {
      width: 80px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    #wb-canvas-wrap {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    #wb-canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #ffffff;
      cursor: crosshair;
    }

    #wb-view-label {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.55);
      color: #ddd;
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 20px;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div id="app">

    <!-- ══════════════════════════════════════════════
         VIDEO GRID
         ══════════════════════════════════════════════ -->
    <div id="video-grid">
      <div id="empty-msg">
        <span>📡</span>
        Connecting to classroom…
      </div>

      <!-- WHITEBOARD PANEL -->
      <div id="whiteboard-panel" class="video-tile" style="display: none;">
        <div id="wb-header">
          <span>🖊️ Whiteboard</span>
          <button id="wb-close" onclick="toggleWhiteboard(false)" title="Close whiteboard">✕</button>
        </div>
        <!-- toolbar: hidden for students via JS -->
        <div id="wb-toolbar">
          <button class="wb-btn active" id="wb-pencil-btn" onclick="wbSetTool('pencil')">✏️ Pencil</button>
          <button class="wb-btn" id="wb-eraser-btn" onclick="wbSetTool('eraser')">🧹 Eraser</button>
          <label style="color:var(--muted);font-size:12px;display:flex;align-items:center;gap:6px;">
            Color <input type="color" id="wb-color" value="#4f6ef7">
          </label>
          <label style="color:var(--muted);font-size:12px;display:flex;align-items:center;gap:6px;">
            Size <input type="range" id="wb-size" min="1" max="30" value="4">
          </label>
          <button class="wb-btn danger" onclick="wbClear(true)">🗑️ Clear</button>
        </div>
        <div id="wb-canvas-wrap">
          <canvas id="wb-canvas"></canvas>
          <div id="wb-view-label" style="display:none">👁️ View Only</div>
        </div>
      </div>
    </div>

    <!-- ══════════════════════════════════════════════
         CONTROLS
         All actions route through LiveKit SDK methods.
         opentok-layout is called after any tile change.
         ══════════════════════════════════════════════ -->
    <div id="controls">
      <button class="ctrl-btn" id="mic-btn" title="Toggle mic" onclick="toggleMic()">🎤</button>
      <button class="ctrl-btn" id="cam-btn" title="Toggle camera" onclick="toggleCam()">📹</button>
      <button class="ctrl-btn" id="screen-btn" title="Toggle screen share" onclick="toggleScreen()">📺</button>
      <button class="ctrl-btn" id="hand-btn" title="Raise hand" onclick="toggleHand()">✋</button>
      <button class="ctrl-btn" id="wb-btn" title="Toggle whiteboard" onclick="toggleWhiteboard()">🖊️</button>
      <button class="ctrl-btn" id="chat-btn" title="Toggle chat" onclick="toggleChat()">
        💬<span id="chat-unread"></span>
      </button>
      <!-- Recording button — shown to teacher only via JS -->
      <button class="ctrl-btn" id="rec-btn" title="Start/Stop Recording" onclick="toggleRecording()"
        style="display:none">⏺️</button>
      <button class="ctrl-btn ctrl-leave" title="Leave" onclick="leaveRoom()">LEAVE</button>
    </div>

  </div>

  <!-- CHAT PANEL -->
  <div id="chat-panel">
    <div id="chat-header">
      <span>💬 Classroom Chat</span>
      <button id="chat-close" onclick="toggleChat()" title="Close chat">✕</button>
    </div>
    <div id="chat-messages"></div>
    <div id="chat-input-row">
      <input id="chat-input" placeholder="Type a message…" maxlength="500"
        onkeydown="if(event.key==='Enter' && !event.shiftKey){ event.preventDefault(); sendChat(); }">
      <button id="chat-send" onclick="sendChat()" title="Send">➤</button>
    </div>
  </div>

  <!-- HAND TOAST -->
  <div id="hand-notify"></div>

  <!-- RECORDING INDICATOR -->
  <div id="rec-indicator">
    <span>⏺</span>
    <span>REC</span>
  </div>

  <script>

    /* ════════════════════════════════════════════════════════════════════════════ */
    const LK = window.LivekitClient;  // LiveKit namespace

    // ── State ────────────────────────────────────────────────────────────────
    let room = null;   // LiveKit Room instance
    let layout = null;   // opentok-layout instance

    // ════════════════════════════════════════════════════════════════════════════
    // 1. LAYOUT MANAGER  (opentok-layout-js)
    //    Initialised once, called whenever tiles are added / removed / resized.
    // ════════════════════════════════════════════════════════════════════════════
    function initLayout() {
      if (typeof initLayoutContainer !== 'function') {
        console.error(
          '[Layout] initLayoutContainer is not defined.\n' +
          'The opentok-layout-js script failed to load from CDN.\n' +
          'Check network connectivity or host opentok-layout.min.js locally.'
        );
        return;
      }
      const container = document.getElementById('video-grid');
      layout = initLayoutContainer(container, {
        maxRatio: 16 / 9,
        minRatio: 9 / 16,
        fixedRatio: false,        // crop to fill; set true to preserve aspect ratios
        bigClass: 'OT_big',     // class we add to pinned / screen-share tiles
        bigPercentage: 0.8,          // big tile gets 80 % of the container
        minBigPercentage: 0.6,
        scaleLastRow: true,
        alignItems: 'center',
        bigAlignItems: 'center',
        smallAlignItems: 'center',
        animate: false,        // we handle animation via CSS transitions
      });
      console.log('[Layout] opentok-layout-js ready.');
    }

    /** Call this every time a tile is added, removed, or the window resizes. */
    function reflow() {
      if (layout) layout.layout();
    }

    // ════════════════════════════════════════════════════════════════════════════
    // 2. TILE MANAGEMENT
    // ════════════════════════════════════════════════════════════════════════════

    /** Create or return the tile <div> for a given id. */
    function getOrCreateTile(tileId, label, isBig, isLocal) {
      let tile = document.getElementById(tileId);
      if (tile) return tile;

      tile = document.createElement('div');
      tile.id = tileId;
      tile.className = 'video-tile' + (isBig ? ' OT_big' : '') + (isLocal ? ' is-local' : '');
      tile.innerHTML = `
        <div class="tile-name">${label}</div>
        <div class="tile-muted" id="muted-${tileId}">🔇 Muted</div>
        <div class="tile-hand" id="hand-${tileId}">✋</div>
        <button class="tile-pin" title="Pin" onclick="togglePin('${tileId}')">📌</button>
      `;
      document.getElementById('video-grid').appendChild(tile);
      document.getElementById('empty-msg').style.display = 'none';
      return tile;
    }

    /** Attach a LiveKit VideoTrack's <video> element into a tile. */
    function attachVideoTrack(track, tileId) {
      const tile = document.getElementById(tileId);
      if (!tile) return;

      // Remove stale <video> if any
      tile.querySelectorAll('video').forEach(v => v.remove());

      // LiveKit's track.attach() creates and returns a <video> element
      const videoEl = track.attach();
      // LiveKit sometimes sets an inline mirror style — clear it so our CSS rules win
      videoEl.style.transform = '';
      tile.appendChild(videoEl);

      reflow();   // tell opentok-layout-js to recalculate positions
    }

    /** Remove a tile and trigger a layout refresh. */
    function removeTile(tileId) {
      const tile = document.getElementById(tileId);
      if (!tile) return;

      // Fade out before removing (optional polish)
      tile.classList.remove('ot-layout');
      setTimeout(() => {
        tile.remove();
        const hasActiveTile = Array.from(document.querySelectorAll('.video-tile')).some(t => t.id !== 'whiteboard-panel' || t.classList.contains('open'));
        if (!hasActiveTile) {
          document.getElementById('empty-msg').style.display = '';
        }
        reflow();
      }, 300);
    }

    /** Toggle the "big / pinned" state of a tile. */
    function togglePin(tileId) {
      const tile = document.getElementById(tileId);
      const wasBig = tile.classList.contains('OT_big');
      // Remove OT_big from all tiles first
      document.querySelectorAll('.video-tile').forEach(t => t.classList.remove('OT_big'));
      // Toggle on/off
      if (!wasBig) tile.classList.add('OT_big');
      reflow();
    }

    // ════════════════════════════════════════════════════════════════════════════
    // 3. LIVEKIT — ROOM EVENTS
    //    LiveKit tells us when tracks appear/disappear; we update tiles & reflow.
    // ════════════════════════════════════════════════════════════════════════════

    function bindRoomEvents() {
      // ── Remote track subscribed ──────────────────────────────────────────
      room.on(LK.RoomEvent.TrackSubscribed, (track, publication, participant) => {
        if (track.kind === LK.Track.Kind.Video) {
          const isScreen = publication.source === LK.Track.Source.ScreenShare;
          const tileId = isScreen
            ? `tile-screen-${participant.identity}`
            : `tile-cam-${participant.identity}`;
          const label = isScreen ? `${participant.identity}'s Screen` : participant.identity;

          getOrCreateTile(tileId, label, isScreen, false);
          attachVideoTrack(track, tileId);
        }

        // Audio: LiveKit handles it — attach to a detached <audio> element
        if (track.kind === LK.Track.Kind.Audio) {
          track.attach();   // no visual tile needed
        }
      });

      // ── Remote track unsubscribed ────────────────────────────────────────
      room.on(LK.RoomEvent.TrackUnsubscribed, (track, publication, participant) => {
        if (track.kind === LK.Track.Kind.Video) {
          const isScreen = publication.source === LK.Track.Source.ScreenShare;
          const tileId = isScreen
            ? `tile-screen-${participant.identity}`
            : `tile-cam-${participant.identity}`;
          removeTile(tileId);
        }
      });

      // ── Local screen-share stopped (e.g. user hit browser's "Stop sharing") ──
      room.on(LK.RoomEvent.LocalTrackUnpublished, (publication) => {
        if (publication.source === LK.Track.Source.ScreenShare) {
          removeTile(`tile-screen-${room.localParticipant.identity}`);
          document.getElementById('screen-btn').classList.remove('off');
        }
      });

      // ── Participant left ─────────────────────────────────────────────────
      room.on(LK.RoomEvent.ParticipantDisconnected, (participant) => {
        removeTile(`tile-cam-${participant.identity}`);
        removeTile(`tile-screen-${participant.identity}`);
      });

      // ── Mute state changed ───────────────────────────────────────────────
      room.on(LK.RoomEvent.TrackMuted, (publication, participant) => {
        if (publication.kind === LK.Track.Kind.Audio) {
          const badge = document.getElementById(`muted-tile-cam-${participant.identity}`);
          if (badge) badge.classList.add('show');
        }
      });

      room.on(LK.RoomEvent.TrackUnmuted, (publication, participant) => {
        if (publication.kind === LK.Track.Kind.Audio) {
          const badge = document.getElementById(`muted-tile-cam-${participant.identity}`);
          if (badge) badge.classList.remove('show');
        }
      });

      // ── DataChannel: Chat + Hand Raise + Recording ────────────────────────────────
      room.on(LK.RoomEvent.DataReceived, (data, participant) => {
        try {
          const msg = JSON.parse(new TextDecoder().decode(data));

          if (msg.type === 'hand_raise') {
            const tileId = `tile-cam-${msg.identity}`;
            const badge = document.getElementById(`hand-${tileId}`);
            if (badge) badge.classList.toggle('show', msg.raised);
            if (msg.raised) {
              const n = document.getElementById('hand-notify');
              n.textContent = `✋ ${msg.identity} raised their hand`;
              n.classList.add('show');
              setTimeout(() => n.classList.remove('show'), 3500);
            }
          }

          if (msg.type === 'chat') {
            appendChatMessage(msg.from, msg.text, msg.time, false);
            // Show unread badge if chat is closed
            if (!document.getElementById('chat-panel').classList.contains('open')) {
              unreadCount++;
              const badge = document.getElementById('chat-unread');
              badge.textContent = unreadCount > 9 ? '9+' : unreadCount;
              badge.classList.add('show');
            }
          }

          if (msg.type === 'wb_stroke') {
            wbReplayStroke(msg);
          }

          if (msg.type === 'wb_clear') {
            wbClearCanvas();
          }

          if (msg.type === 'wb_toggle') {
            if (msg.open !== wbOpen) {
              toggleWhiteboard(msg.open, false);
            }
          }

          // ── Recording status notification ──────────────
          if (msg.type === 'rec_status') {
            const indicator = document.getElementById('rec-indicator');
            indicator.classList.toggle('show', msg.recording);
          }

        } catch (e) { /* ignore non-JSON */ }
      });
    }

    // ════════════════════════════════════════════════════════════════════════════
    // 4. LIVEKIT — CONNECT & PUBLISH LOCAL TRACKS
    // ════════════════════════════════════════════════════════════════════════════

    async function connectAndPublish() {
      const token = localStorage.getItem('openvidu_token');
      if (!token) { window.location.href = '/'; return; }

      // TODO: Change to 'wss://vedulive.net2coder.in' when deploying
      const serverUrl = 'ws://localhost:7880';

      // Create room with high-quality settings
      room = new LK.Room({
        adaptiveStream: true,   // auto-downscale for slow networks
        dynacast: true,   // only send layers that are subscribed

        // ── VIDEO capture settings ────────────────────────────────
        videoCaptureDefaults: {
          resolution: LK.VideoPresets.h1080.resolution,  // capture at 1080p
        },

        // ── AUDIO capture settings ────────────────────────────────
        audioCaptureDefaults: {
          autoGainControl: true,   // normalize volume levels
          echoCancellation: true,   // remove speaker echo
          noiseSuppression: true,   // reduce background noise
          sampleRate: 48000,  // 48kHz (CD quality)
        },

        // ── PUBLISH defaults ──────────────────────────────────────
        publishDefaults: {
          // Video
          videoSimulcast: true,                             // send 3 quality layers
          videoCodec: 'h264',                           // H264: better quality at lower bitrate than VP8
          videoEncoding: {
            maxBitrate: 2_500_000,   // 2.5 Mbps max for 1080p
            maxFramerate: 30,
          },
          simulcastLayers: [
            { width: 320, height: 180, encoding: { maxBitrate: 150_000, maxFramerate: 15 } },  // low
            { width: 640, height: 360, encoding: { maxBitrate: 500_000, maxFramerate: 24 } },  // mid
            { width: 1280, height: 720, encoding: { maxBitrate: 1_200_000, maxFramerate: 30 } }, // high
          ],
          // Audio
          audioPreset: {
            maxBitrate: 64_000,   // 64 kbps — clear voice, low bandwidth
          },
        },
      });

      bindRoomEvents();

      try {
        await room.connect(serverUrl, token);
        console.log('[LiveKit] Connected as', room.localParticipant.identity);
      } catch (err) {
        console.error('[LiveKit] Connection failed', err);
        return;
      }

      // ── Publish microphone (LiveKit manages audio, no tile needed) ──────
      const wantMic = localStorage.getItem('vedu_mic_pref') !== 'false';
      await room.localParticipant.setMicrophoneEnabled(wantMic);
      document.getElementById('mic-btn').classList.toggle('off', !wantMic);

      // ── Publish camera & create local video tile ────────────────────────
      const wantCam = localStorage.getItem('vedu_cam_pref') !== 'false';
      if (wantCam) {
        await room.localParticipant.setCameraEnabled(true, {
          resolution: LK.VideoPresets.h1080.resolution,
          simulcast: true,
        });
        showLocalCameraVideo();
      }
      document.getElementById('cam-btn').classList.toggle('off', !wantCam);
    }

    /** Grab local camera track from LiveKit and render it in a tile. */
    function showLocalCameraVideo() {
      const identity = room.localParticipant.identity;
      const pub = room.localParticipant.getTrackPublication(LK.Track.Source.Camera);
      if (!pub?.videoTrack) return;

      const tileId = `tile-cam-${identity}`;
      getOrCreateTile(tileId, `${identity} (you)`, false, true);
      attachVideoTrack(pub.videoTrack, tileId);
    }

    // ════════════════════════════════════════════════════════════════════════════
    // 5. CONTROLS  (call LiveKit SDK; then reflow layout as needed)
    // ════════════════════════════════════════════════════════════════════════════

    async function toggleMic() {
      // LiveKit: flip mic state
      const active = !room.localParticipant.isMicrophoneEnabled;
      await room.localParticipant.setMicrophoneEnabled(active);

      // UI feedback
      document.getElementById('mic-btn').innerText = active ? '🎤' : '🔇';
      document.getElementById('mic-btn').classList.toggle('off', !active);
      // No layout reflow needed — audio has no video tile
    }

    async function toggleCam() {
      const active = !room.localParticipant.isCameraEnabled;
      const identity = room.localParticipant.identity;

      // LiveKit: flip camera state
      await room.localParticipant.setCameraEnabled(active, {
        resolution: LK.VideoPresets.h1080.resolution,
        simulcast: true,
      });

      // UI feedback
      document.getElementById('cam-btn').innerText = active ? '📹' : '🚫';
      document.getElementById('cam-btn').classList.toggle('off', !active);

      if (active) {
        showLocalCameraVideo();      // add tile → reflow inside
      } else {
        removeTile(`tile-cam-${identity}`);   // remove tile → reflow inside
      }
    }

    async function toggleScreen() {
      const identity = room.localParticipant.identity;
      const isSharing = room.localParticipant.isScreenShareEnabled;

      if (!isSharing) {
        // LiveKit: start screen share
        await room.localParticipant.setScreenShareEnabled(true, {
          resolution: LK.VideoPresets.h1080.resolution,
          contentHint: 'text',
        });
        document.getElementById('screen-btn').classList.add('off');

        // Attach the local screen track to a tile
        const pub = room.localParticipant.getTrackPublication(LK.Track.Source.ScreenShare);
        if (pub?.videoTrack) {
          const tileId = `tile-screen-${identity}`;
          getOrCreateTile(tileId, `${identity}'s Screen`, true, false);
          attachVideoTrack(pub.videoTrack, tileId);
        }
      } else {
        // LiveKit: stop screen share
        await room.localParticipant.setScreenShareEnabled(false);
        document.getElementById('screen-btn').classList.remove('off');
        removeTile(`tile-screen-${identity}`);
      }
    }

    async function leaveRoom() {
      if (!confirm('Leave the classroom?')) return;
      if (handRaised) await toggleHand();

      const params = new URLSearchParams(window.location.search);
      const roomName = params.get('room');
      const role = (localStorage.getItem('role') || '').toUpperCase();

      if (roomName && role === 'TEACHER') {
        try {
          await fetch('/api/meetings/end_room', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ roomName: roomName })
          });
        } catch (e) {
          console.error("Failed to end room", e);
        }
      }

      await room.disconnect();
      window.location.href = '/';
    }

    // ── Hand Raise ────────────────────────────────────────────────────────
    let handRaised = false;

    async function toggleHand() {
      handRaised = !handRaised;
      const btn = document.getElementById('hand-btn');
      btn.classList.toggle('off', handRaised);
      btn.innerText = handRaised ? '🖐️' : '✋';
      btn.title = handRaised ? 'Lower hand' : 'Raise hand';

      // Own tile badge
      const own = document.getElementById(`hand-tile-cam-${room.localParticipant.identity}`);
      if (own) own.classList.toggle('show', handRaised);

      await room.localParticipant.publishData(
        new TextEncoder().encode(JSON.stringify({
          type: 'hand_raise',
          identity: room.localParticipant.identity,
          raised: handRaised,
        })),
        { reliable: true }
      );
    }

    // ── Chat ─────────────────────────────────────────────────────────────
    let chatOpen = false;
    let unreadCount = 0;

    function toggleChat() {
      chatOpen = !chatOpen;
      document.getElementById('chat-panel').classList.toggle('open', chatOpen);
      document.getElementById('chat-btn').classList.toggle('off', chatOpen);
      if (chatOpen) {
        unreadCount = 0;
        document.getElementById('chat-unread').classList.remove('show');
        document.getElementById('chat-input').focus();
        // Scroll to bottom
        const msgs = document.getElementById('chat-messages');
        msgs.scrollTop = msgs.scrollHeight;
      }
    }

    async function sendChat() {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';

      const from = room.localParticipant.identity;
      const time = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });

      // Show own message immediately
      appendChatMessage(from, text, time, true);

      // Broadcast to everyone else
      await room.localParticipant.publishData(
        new TextEncoder().encode(JSON.stringify({ type: 'chat', from, text, time })),
        { reliable: true }
      );
    }

    function appendChatMessage(from, text, time, isMine) {
      const msgs = document.getElementById('chat-messages');
      const div = document.createElement('div');
      div.className = 'chat-msg ' + (isMine ? 'mine' : 'theirs');
      div.innerHTML = `
        <div class="msg-meta">${isMine ? 'You' : from} · ${time}</div>
        ${escHtml(text)}
      `;
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function escHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // ════════════════════════════════════════════════════════════════════════════
    // 6. RECORDING (Teacher Only)
    // ════════════════════════════════════════════════════════════════════════════
    const isTeacher = (localStorage.getItem('role') || '').toUpperCase() === 'TEACHER';
    let isRecording = false;

    // Show the record button only for teachers
    if (isTeacher) {
      document.getElementById('rec-btn').style.display = 'flex';
    }

    async function toggleRecording() {
      const params = new URLSearchParams(window.location.search);
      const roomName = params.get('room');
      const authToken = localStorage.getItem('vedu_token');

      const endpoint = isRecording
        ? '/api/meetings/recording/stop'
        : '/api/meetings/recording/start';

      try {
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${authToken}`
          },
          body: JSON.stringify({ roomName })
        });

        if (!res.ok) {
          const err = await res.json();
          alert('Recording error: ' + (err.error || res.statusText));
          return;
        }

        // Toggle state
        isRecording = !isRecording;

        // Update button appearance
        const btn = document.getElementById('rec-btn');
        const indicator = document.getElementById('rec-indicator');

        btn.classList.toggle('recording', isRecording);
        btn.title = isRecording ? 'Stop Recording' : 'Start Recording';
        btn.innerText = isRecording ? '⏹️' : '⏺️';

        // Show/hide indicator
        indicator.classList.toggle('show', isRecording);

        // Notify all students via DataChannel
        if (room && room.localParticipant) {
          await room.localParticipant.publishData(
            new TextEncoder().encode(JSON.stringify({
              type: 'rec_status',
              recording: isRecording,
              timestamp: new Date().toISOString()
            })),
            { reliable: true }
          );
        }

        console.log(isRecording ? 'Recording started' : 'Recording stopped');
      } catch (e) {
        console.error('Recording toggle failed:', e);
        alert('Failed to toggle recording: ' + e.message);
      }
    }

    // ════════════════════════════════════════════════════════════════════════════
    // 7. WHITEBOARD
    // ════════════════════════════════════════════════════════════════════════════
    let wbOpen = false;
    let wbTool = 'pencil';   // 'pencil' | 'eraser'
    let wbDrawing = false;
    let wbPoints = [];

    function initWhiteboard() {
      const canvas = document.getElementById('wb-canvas');
      const wrap = document.getElementById('wb-canvas-wrap');

      // Size canvas to its container
      function resizeCanvas() {
        if (!wrap.clientWidth || !wrap.clientHeight) return;
        // Preserve existing drawing scaled
        const tmp = document.createElement('canvas');
        if (canvas.width > 0 && canvas.height > 0) {
          tmp.width = canvas.width;
          tmp.height = canvas.height;
          tmp.getContext('2d').drawImage(canvas, 0, 0);
        }
        canvas.width = wrap.clientWidth;
        canvas.height = wrap.clientHeight;
        if (tmp.width > 0) {
          canvas.getContext('2d').drawImage(tmp, 0, 0);
        }
      }
      window.resizeWbCanvas = resizeCanvas;
      resizeCanvas();
      window.addEventListener('resize', () => { if (wbOpen) resizeCanvas(); });

      if (!isTeacher) {
        // Student: view-only
        document.getElementById('wb-toolbar').style.display = 'none';
        document.getElementById('wb-view-label').style.display = 'block';
        canvas.style.cursor = 'default';
        canvas.style.pointerEvents = 'none';
        return;
      }

      // ── Teacher drawing events ──────────────────────────────────
      function getPos(e) {
        const r = canvas.getBoundingClientRect();
        const src = e.touches ? e.touches[0] : e;
        return { x: src.clientX - r.left, y: src.clientY - r.top };
      }

      function startDraw(e) {
        e.preventDefault();
        wbDrawing = true;
        const p = getPos(e);
        wbPoints = [p];
        const ctx = canvas.getContext('2d');
        applyDrawStyle(ctx);
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
      }

      function moveDraw(e) {
        if (!wbDrawing) return;
        e.preventDefault();
        const p = getPos(e);
        wbPoints.push(p);
        const ctx = canvas.getContext('2d');
        applyDrawStyle(ctx);
        ctx.lineTo(p.x, p.y);
        ctx.stroke();

        if (wbPoints.length >= 5) {
          broadcastStroke();
          wbPoints = [p];
        }
      }

      function endDraw(e) {
        if (!wbDrawing) return;
        wbDrawing = false;
        if (wbPoints.length >= 1) {
          broadcastStroke();
        }
        wbPoints = [];
      }

      canvas.addEventListener('mousedown', startDraw);
      canvas.addEventListener('mousemove', moveDraw);
      canvas.addEventListener('mouseup', endDraw);
      canvas.addEventListener('mouseleave', endDraw);
      canvas.addEventListener('touchstart', startDraw, { passive: false });
      canvas.addEventListener('touchmove', moveDraw, { passive: false });
      canvas.addEventListener('touchend', endDraw);
    }

    function applyDrawStyle(ctx) {
      const size = parseInt(document.getElementById('wb-size').value, 10);
      const color = document.getElementById('wb-color').value;
      ctx.lineWidth = wbTool === 'eraser' ? size * 4 : size;
      ctx.strokeStyle = wbTool === 'eraser' ? '#ffffff' : color;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
    }

    function wbSetTool(tool) {
      wbTool = tool;
      document.getElementById('wb-pencil-btn').classList.toggle('active', tool === 'pencil');
      document.getElementById('wb-eraser-btn').classList.toggle('active', tool === 'eraser');
    }

    function wbClearCanvas() {
      const canvas = document.getElementById('wb-canvas');
      canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
    }

    async function wbClear(broadcast) {
      wbClearCanvas();
      if (broadcast && room) {
        await room.localParticipant.publishData(
          new TextEncoder().encode(JSON.stringify({ type: 'wb_clear' })),
          { reliable: true }
        );
      }
    }

    async function broadcastStroke() {
      if (!room || !wbPoints || wbPoints.length === 0) return;

      let toSend = wbPoints;
      if (toSend.length === 1) {
        toSend = [toSend[0], toSend[0]];
      }

      const color = document.getElementById('wb-color').value;
      const size = parseInt(document.getElementById('wb-size').value, 10);
      const msg = {
        type: 'wb_stroke',
        tool: wbTool,
        color: wbTool === 'eraser' ? '#ffffff' : color,
        width: wbTool === 'eraser' ? size * 4 : size,
        points: toSend.map(p => [Math.round(p.x), Math.round(p.y)]),
        cw: document.getElementById('wb-canvas').width,
        ch: document.getElementById('wb-canvas').height,
      };
      await room.localParticipant.publishData(
        new TextEncoder().encode(JSON.stringify(msg)),
        { reliable: true }
      );
    }

    function wbReplayStroke(msg) {
      const canvas = document.getElementById('wb-canvas');
      const ctx = canvas.getContext('2d');
      if (!msg.points || msg.points.length < 2) return;
      // Scale to local canvas size
      const sx = canvas.width / (msg.cw || canvas.width);
      const sy = canvas.height / (msg.ch || canvas.height);
      ctx.beginPath();
      ctx.lineWidth = msg.width;
      ctx.strokeStyle = msg.color;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.moveTo(msg.points[0][0] * sx, msg.points[0][1] * sy);
      for (let i = 1; i < msg.points.length; i++) {
        ctx.lineTo(msg.points[i][0] * sx, msg.points[i][1] * sy);
      }
      ctx.stroke();
    }

    function toggleWhiteboard(forceOpen, broadcast = true) {
      wbOpen = typeof forceOpen === 'boolean' ? forceOpen : !wbOpen;
      const panel = document.getElementById('whiteboard-panel');

      if (wbOpen) {
        panel.classList.add('open');
        document.querySelectorAll('.video-tile').forEach(t => t.classList.remove('OT_big'));
        panel.classList.add('OT_big');
        document.getElementById('empty-msg').style.display = 'none';
      } else {
        panel.classList.remove('open');
        panel.classList.remove('OT_big');
        const hasActiveTile = Array.from(document.querySelectorAll('.video-tile')).some(t => t.id !== 'whiteboard-panel' || t.classList.contains('open'));
        if (!hasActiveTile) {
          document.getElementById('empty-msg').style.display = '';
        }
      }

      document.getElementById('wb-btn').classList.toggle('off', wbOpen);
      reflow();

      if (wbOpen) {
        setTimeout(() => {
          if (window.resizeWbCanvas) window.resizeWbCanvas();
        }, 350);
      }

      if (broadcast && isTeacher && room) {
        room.localParticipant.publishData(
          new TextEncoder().encode(JSON.stringify({ type: 'wb_toggle', open: wbOpen })),
          { reliable: true }
        );
      }
    }

    // ════════════════════════════════════════════════════════════════════════════
    // 8. BOOTSTRAP
    // ════════════════════════════════════════════════════════════════════════════

    window.onresize = () => reflow();

    window.onload = async () => {
      initLayout();
      initWhiteboard();
      await connectAndPublish();
    };

  </script>
</body>

</html>
